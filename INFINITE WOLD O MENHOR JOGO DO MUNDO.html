<!doctype html>
<html lang="pt-BR">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Infinite World - Paradox Edition (V2)</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=VT323&amp;display=swap" rel="stylesheet">
  <style>
:root{--neon-green:#00ff66;--neon-blue:#00d4ff;--neon-purple:#bd00ff;--neon-red:#ff3366;--neon-gold:#ffb700;--ui-bg:rgba(2,8,4,0.92);}
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;}
body{background:#020205;color:#fff;font-family:'Orbitron',sans-serif;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;width:100%;}
#gameContainer{position:relative;width:95vw;height:90vh;max-width:1440px;max-height:810px;overflow:hidden;border:3px solid rgba(0,255,102,0.6);box-shadow:0 0 20px rgba(0,255,102,0.3),inset 0 0 40px rgba(0,0,0,0.9);background:#000;border-radius:12px;}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;}
.overlay{position:absolute;width:100%;height:100%;top:0;left:0;display:none;z-index:100;background:radial-gradient(circle at center,#05140b 0%,#010402 100%);flex-direction:column;justify-content:center;align-items:center;}
#splash-screen{position:absolute;width:100%;height:100%;top:0;left:0;z-index:200;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 0.8s ease-out;}
.dev-title{font-size:18px;color:var(--neon-green);letter-spacing:10px;opacity:0.7;margin-bottom:10px;text-shadow:0 0 10px var(--neon-green);}
.dev-name{font-size:65px;color:#fff;font-weight:900;letter-spacing:5px;text-shadow:0 0 30px var(--neon-green);animation:pulseGlow 1.5s infinite alternate;}
@keyframes pulseGlow{0%{transform:scale(0.97);text-shadow:0 0 20px rgba(0,255,102,0.5);}100%{transform:scale(1.03);text-shadow:0 0 40px rgba(0,255,102,1);}}
.menu-layout{align-items:flex-start;padding-left:8%;justify-content:center;}
.menu-sidebar{width:420px;background:rgba(1,10,5,0.85);padding:40px;border-radius:16px;border:2px solid var(--neon-green);backdrop-filter:blur(12px);box-shadow:0 0 50px rgba(0,255,102,0.25);}
.logo{font-size:60px;font-weight:900;line-height:0.9;margin-bottom:35px;color:#fff;text-shadow:0 0 20px var(--neon-blue);letter-spacing:2px;}
.logo span{color:var(--neon-green);text-shadow:0 0 25px var(--neon-green);}
.menu-button{display:flex;align-items:center;gap:15px;font-size:18px;padding:15px 25px;margin-bottom:15px;cursor:pointer;transition:all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);color:#d0ffd0;border:1px solid rgba(0,255,100,0.2);background:rgba(0,30,10,0.3);border-radius:8px;width:100%;font-weight:bold;letter-spacing:1px;}
.menu-button:hover{color:#000;background:var(--neon-green);box-shadow:0 0 30px var(--neon-green);transform:translateX(10px) scale(1.02);}
#hud{position:absolute;width:100%;height:100%;top:0;left:0;pointer-events:none;display:none;z-index:50;}
.player-info{position:absolute;top:20px;left:20px;width:300px;background:var(--ui-bg);padding:14px;border:2px solid var(--neon-blue);border-radius:10px;backdrop-filter:blur(6px);}
.bar-container{width:100%;height:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);margin-top:6px;border-radius:4px;overflow:hidden;}
.fill-hp{height:100%;width:100%;background:linear-gradient(90deg,var(--neon-red),#cc0033);transition:width 0.2s;}
.fill-xp{height:100%;width:0%;background:linear-gradient(90deg,var(--neon-purple),#7700cc);transition:width 0.4s;}
.coin-display{position:absolute;top:20px;left:340px;background:var(--ui-bg);border:2px solid var(--neon-gold);padding:8px 16px;border-radius:10px;font-size:14px;font-weight:bold;color:var(--neon-gold);display:flex;align-items:center;gap:8px;}
#dialogue-box{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);width:85%;max-width:900px;background:var(--ui-bg);border:3px solid var(--neon-green);padding:20px;border-radius:12px;display:none;font-size:22px;font-family:'VT323';color:#fff;pointer-events:auto;}
</style>
  <script src="assets.js"></script>
 </head>
 <body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
        <div class="player-info">
            <div id="hud-name">AVENTUREIRO LV. 1</div>
            <div class="bar-container"><div id="hp-fill" class="fill-hp"></div></div>
            <div class="bar-container"><div id="xp-fill" class="fill-xp"></div></div>
        </div>
        <div class="coin-display">💰 <span id="hud-coins">0</span></div>
    </div>
    <div id="main-menu" class="overlay menu-layout" style="display:flex;">
        <div class="menu-sidebar">
            <div class="logo">INFINITE<br><span>PARADOX</span></div>
            <div class="menu-button" id="start-btn">🎮 INICIAR JOGO</div>
            <div class="menu-button" onclick="alert('Loja em breve!')">🛒 LOJA DE SKINS</div>
            <div class="menu-button" onclick="alert('Kawe Developer - 2024')">📜 CRÉDITOS</div>
        </div>
    </div>
    <div id="splash-screen">
        <div class="dev-title">APRESENTA</div>
        <div class="dev-name">KAWE DEVELOPER</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1280;
    canvas.height = 720;

    const images = {};
    let loadedImages = 0;
    const totalImages = Object.keys(ASSETS_B64).length;

    function loadAssets(callback) {
        for (let name in ASSETS_B64) {
            images[name] = new Image();
            images[name].onload = () => {
                loadedImages++;
                if (loadedImages === totalImages) callback();
            };
            images[name].src = ASSETS_B64[name];
        }
    }

    class Particle {
        constructor(x, y, vx, vy, size, color, life, type) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.size = size; this.color = color; this.life = life;
            this.maxLife = life; this.type = type;
        }
        update() {
            this.x += this.vx; this.y += this.vy; this.life--;
            if (this.type === 'smoke') this.size *= 0.95;
        }
        draw(ctx, camX) {
            ctx.save();
            ctx.globalAlpha = this.life / this.maxLife;
            ctx.fillStyle = this.color;
            if (this.type === 'dust' && images['dust']) {
                ctx.drawImage(images['dust'], this.x - camX, this.y, this.size, this.size);
            } else {
                ctx.fillRect(this.x - camX, this.y, this.size, this.size);
            }
            ctx.restore();
        }
    }

    const game = {
        state: "MENU",
        player: { x: 300, y: 550, w: 64, h: 64, velY: 0, isJumping: false, facingRight: true, speed: 6, hp: 100, maxHp: 100, xp: 0, maxXp: 100, level: 1 },
        cameraX: 0,
        entities: [],
        particles: [],
        coins: 0,
        frameCount: 0,

        init() {
            this.entities = [];
            this.particles = [];
            // Casas e Cenário
            for(let i=0; i<10; i++) {
                this.entities.push({ type: 'house', x: 400 + i * 1200, y: 400, w: 250, h: 250 });
            }
            // Inimigos e Coelhos
            for(let i=0; i<20; i++) {
                this.entities.push({ 
                    type: Math.random() > 0.6 ? 'enemy' : 'rabbit', 
                    x: 800 + Math.random() * 8000, 
                    y: 600, w: 48, h: 48, 
                    dir: 1, speed: 1 + Math.random() * 2 
                });
            }
        },

        spawnDust(x, y) {
            for(let i=0; i<5; i++) {
                this.particles.push(new Particle(
                    x + (Math.random()-0.5)*20, y, 
                    (Math.random()-0.5)*2, -Math.random()*2, 
                    15 + Math.random()*15, '#fff', 20, 'dust'
                ));
            }
        },

        update() {
            if (this.state !== "PLAYING") return;
            this.frameCount++;

            // Movimento
            if (keys['arrowright'] || keys['d']) {
                this.player.x += this.player.speed;
                this.player.facingRight = true;
            }
            if (keys['arrowleft'] || keys['a']) {
                this.player.x -= this.player.speed;
                this.player.facingRight = false;
            }

            // Pulo
            this.player.velY += 0.8;
            this.player.y += this.player.velY;
            if (this.player.y >= 550) {
                if (this.player.isJumping) {
                    this.spawnDust(this.player.x + 32, 600);
                }
                this.player.y = 550;
                this.player.velY = 0;
                this.player.isJumping = false;
            }

            if ((keys['arrowup'] || keys['w'] || keys[' ']) && !this.player.isJumping) {
                this.player.velY = -15;
                this.player.isJumping = true;
                this.spawnDust(this.player.x + 32, 600);
            }

            // Camera
            this.cameraX += (this.player.x - this.cameraX - 400) * 0.1;

            // Entidades
            this.entities.forEach(e => {
                if (e.type === 'rabbit' || e.type === 'enemy') {
                    e.x += e.dir * e.speed;
                    if (Math.random() > 0.98) e.dir *= -1;
                }
            });

            // Partículas
            this.particles.forEach((p, i) => {
                p.update();
                if (p.life <= 0) this.particles.splice(i, 1);
            });

            // UI
            document.getElementById('hud-coins').innerText = this.coins;
        },

        draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background Infinito
            if (images['background']) {
                let bgX = -(this.cameraX * 0.5) % images['background'].width;
                ctx.drawImage(images['background'], bgX, 0, canvas.width, canvas.height);
                ctx.drawImage(images['background'], bgX + canvas.width, 0, canvas.width, canvas.height);
            }

            // Entidades
            this.entities.forEach(e => {
                if (images[e.type]) {
                    ctx.drawImage(images[e.type], e.x - this.cameraX, e.y, e.w, e.h);
                }
            });

            // Partículas
            this.particles.forEach(p => p.draw(ctx, this.cameraX));

            // Player
            if (images['player']) {
                ctx.save();
                if (!this.player.facingRight) {
                    ctx.translate(this.player.x - this.cameraX + this.player.w, this.player.y);
                    ctx.scale(-1, 1);
                    ctx.drawImage(images['player'], 0, 0, this.player.w, this.player.h);
                } else {
                    ctx.drawImage(images['player'], this.player.x - this.cameraX, this.player.y, this.player.w, this.player.h);
                }
                ctx.restore();
            }
        },

        loop() {
            this.update();
            this.draw();
            requestAnimationFrame(() => this.loop());
        }
    };

    const keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        game.state = "PLAYING";
        game.init();
    };

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 800);
        }, 2000);
        loadAssets(() => {
            game.loop();
        });
    };
  </script>
 </body>
</html>
